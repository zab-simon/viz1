.link-political    { stroke: #4a9eff; stroke-width: 1.2; }

.link-risk         { stroke: #ff2222; stroke-width: 1; stroke-dasharray: 2,4; }

.link-media        { stroke: #ffcc00; stroke-width: 1; stroke-dasharray: 3,3; }
.link-funding      { stroke: #80ff80; stroke-width: 1.3; }
.link-religious    { stroke: #ffaaaa; stroke-width: 1.1; }
.link-vulnerability{ stroke: #ff6644; stroke-width: 1; stroke-dasharray: 5,3; }
.link-default      { stroke: #444; stroke-width: 1; }

.node circle {
stroke-width: 1.5;
cursor: pointer;
}
.node:hover circle { filter: brightness(1.4); }
.node text {
font-size: 8.5px;
letter-spacing: 0.3px;
pointer-events: none;
text-anchor: middle;
dominant-baseline: hanging;
}

  { source: "Parsa Marvi",          target: "Bundestag",              type: "political" },
  { source: "SPD Landtag BW",       target: "Landtag BW",             type: "political" },
  { source: "SPD Landtag BW",       target: "IRG Baden",              type: "political" },

  // === LOBBY ===
  { source: "Lobbying-Netzwerk",    target: "Politische Kontakte BW", type: "lobby" },
  { source: "Lobbying-Netzwerk",    target: "Wirtschaftsakteure",     type: "lobby" },
  { source: "Lobbying-Netzwerk",    target: "Religiöse Institutionen",type: "lobby" },

  // === DIAMOND ===
  { source: "Diamantenhandel",      target: "Int. Handelsrouten",     type: "diamond" },
  { source: "Int. Handelsrouten",   target: "Diamantenhandel",        type: "diamond" },

  // === LEGAL ===
  { source: "Steuerberater/Anwalt", target: "Rechtsschutz",           type: "legal" },
  { source: "Rechtsschutz",         target: "Risikominimierung",      type: "legal" },

  // === INTERNATIONAL ===
  { source: "WJC",                  target: "Zentralrat der Juden",   type: "international" },
  { source: "EJC",                  target: "EU Institutionen",       type: "international" },
  { source: "EJC",                  target: "WJC",                    type: "international" },
  { source: "CER",                  target: "EJC",                    type: "international" },

  // === MEDIA ===
  { source: "Medien",               target: "Politische Kontakte BW", type: "media" },
  { source: "Medien",               target: "Public Discourse",       type: "media" },
  { source: "Public Discourse",     target: "Gemeinden (8–10)",        type: "media" },

  // === INVESTIGATION ===
  { source: "Ermittlungsteam (2)",  target: "Zeugen",                 type: "investigation" },
  { source: "Ermittlungsteam (2)",  target: "Dokumente",              type: "investigation" },
  { source: "Zeugen",               target: "Beweise",                type: "investigation" },
  { source: "Dokumente",            target: "Beweise",                type: "investigation" },
  { source: "Funding Transparency", target: "Ermittlungsteam (2)",    type: "investigation" },

  // === RISK / VULNERABILITY ===
  { source: "Expositionsrisiko",    target: "Beweisvernichtung",      type: "risk" },
  { source: "Expositionsrisiko",    target: "Netzwerkanpassung",      type: "risk" },
  { source: "Interne Konflikte",    target: "Leadership Elections",   type: "vulnerability" },
  { source: "Leadership Elections", target: "Führungsposition",       type: "vulnerability" },
  { source: "Funding Transparency", target: "Public Discourse",       type: "vulnerability" },
  { source: "Beweise",              target: "Expositionsrisiko",      type: "risk" },
];

const typeColor = {
  financial:     "#f0c040",
  political:     "#4a9eff",
  legal:         "#a0ff80",
  diamond:       "#e080ff",
  lobby:         "#ff8040",
  community:     "#40e0e0",
  investigation: "#ff4444",
  risk:          "#ff2222",
  international: "#cc88ff",
  media:         "#ffcc00",
  funding:       "#80ff80",
  religious:     "#ffaaaa",
  vulnerability: "#ff6644",
  default:       "#444",
};

const svg = d3.select("#graph");
const W = window.innerWidth;
const H = window.innerHeight;
svg.attr("viewBox", `0 0 ${W} ${H}`);

// Arrow markers
const defs = svg.append("defs");
Object.entries(typeColor).forEach(([k,v]) => {
  defs.append("marker")
    .attr("id", `arr-${k}`)
    .attr("viewBox","0 -4 8 8")
    .attr("refX", 8).attr("refY", 0)
    .attr("markerWidth", 5).attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path").attr("d","M0,-4L8,0L0,4").attr("fill", v);
});

const g = svg.append("g").attr("transform", `translate(0,44)`);
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", `translate(${e.transform.x},${e.transform.y + 44}) scale(${e.transform.k})`)));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    const centers = ["Rami Suliman","IRG Baden","Zentralrat der Juden","Gemeinden (8–10)"];
    if (centers.includes(d.source.id) || centers.includes(d.target.id)) return 130;
    return 75;
  }).strength(0.35))
  .force("charge", d3.forceManyBody().strength(-280))
  .force("center", d3.forceCenter(W/2, (H-44)/2))
  .force("collision", d3.forceCollide().radius(d => d.r + 16))
  .force("x", d3.forceX(W/2).strength(0.025))
  .force("y", d3.forceY((H-44)/2).strength(0.025));

const link = g.append("g").selectAll("line")
  .data(links).join("line")
  .attr("class", d => `link link-${d.type}`)
  .attr("marker-end", d => `url(#arr-${d.type})`);

const node = g.append("g").selectAll("g")
  .data(nodes).join("g")
  .attr("class", d => `node ${d.type}`)
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append("circle").attr("r", d => d.r);
node.append("text").attr("dy", d => d.r + 9).text(d => d.id)
  .style("font-size", d => d.r > 14 ? "9.5px" : "7.5px");

// Tooltip
const tooltip = document.getElementById("tooltip");
const typeLabels = { "n-center":"HAUPTAKTEUR","n-center2":"ZWEITZENTRUM","n-org":"ORGANISATION","n-community":"GEMEINDE","n-financial":"FINANZEN","n-political":"POLITIK","n-legal":"LEGAL","n-diamond":"HANDEL","n-lobby":"LOBBYING","n-investigation":"ERMITTLUNG","n-risk":"RISIKO","n-election":"WAHL","n-international":"INTERNATIONAL","n-media":"MEDIEN","n-funding":"FÖRDERUNG","n-religious":"RELIGIÖS","n-vulnerability":"SCHWACHSTELLE","n-bundestag":"STAATLICH","n-person":"PERSON" };

node.on("mouseover", (e,d) => {
  document.getElementById("tt-title").textContent = d.id;
  document.getElementById("tt-type").textContent = typeLabels[d.type] || "";
  document.getElementById("tt-body").textContent = d.desc || "";
  tooltip.style.display = "block";
  tooltip.style.left = (e.pageX+14)+"px";
  tooltip.style.top  = (e.pageY-10)+"px";
}).on("mousemove", e => {
  tooltip.style.left = (e.pageX+14)+"px";
  tooltip.style.top  = (e.pageY-10)+"px";
}).on("mouseout", () => { tooltip.style.display="none"; });

// Layer filter
function filterLayer(layer) {
  document.querySelectorAll(".ctrl-btn").forEach(b => b.classList.remove("active"));
  if (layer !== "all") event.target.classList.add("active");
  
  node.style("opacity", d => layer === "all" || d.layer === layer || d.layer === "all" ? 1 : 0.08);
  link.style("opacity", d => {
    if (layer === "all") return 0.5;
    const sl = nodes.find(n => n.id === (d.source.id||d.source))?.layer;
    const tl = nodes.find(n => n.id === (d.target.id||d.target))?.layer;
    return (sl === layer || tl === layer || d.type === layer) ? 0.8 : 0.04;
  });
}
window.filterLayer = filterLayer;

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y - 44)
    .attr("x2", d => {
      const dx = d.target.x-d.source.x, dy = d.target.y-d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      return d.target.x - (dx/dist)*(d.target.r+7);
    })
    .attr("y2", d => {
      const dx = d.target.x-d.source.x, dy = d.target.y-d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      return d.target.y - 44 - (dy/dist)*(d.target.r+7);
    });
  node.attr("transform", d => `translate(${d.x},${d.y-44})`);
});

document.getElementById("node-count").textContent = nodes.length;
document.getElementById("link-count").textContent = links.length;
</script>

</body>
</html>
